<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Le Saint Coran</title>
    <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Plus+Jakarta+Sans:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --emerald: #064e3b;
            --gold: #d97706;
            --bg: #f8fafc;
        }
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            margin: 0; background: var(--bg); color: #1e293b; 
        }
        header { 
            background: var(--emerald); color: white; 
            padding: 40px 20px; text-align: center;
            border-bottom: 4px solid var(--gold);
        }
        .container { max-width: 600px; margin: -30px auto 0; padding: 0 15px; }
        
        .surah-card { 
            background: white; padding: 20px; margin-bottom: 15px; 
            border-radius: 16px; display: flex; justify-content: space-between; 
            align-items: center; text-decoration: none; color: inherit;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1);
            transition: all 0.3s ease;
            border: 1px solid #e2e8f0;
        }
        .surah-card:active { transform: scale(0.97); background: #f1f5f9; }
        
        .surah-info { display: flex; align-items: center; gap: 15px; }
        .surah-number { 
            background: var(--emerald); color: white; 
            width: 40px; height: 40px; border-radius: 10px;
            display: flex; align-items: center; justify-content: center;
            font-weight: bold; font-size: 14px;
        }
        .surah-name { font-weight: 700; font-size: 16px; color: var(--emerald); }
        .surah-meta { font-size: 12px; color: #64748b; text-transform: uppercase; letter-spacing: 1px; }
        .ar-name { font-family: 'Amiri', serif; font-size: 24px; color: var(--gold); }
    </style>
</head>
<body>

<header>
    <h1 style="margin:0; font-size: 28px;">Le Saint Coran</h1>
    <p style="margin:10px 0 0; opacity: 0.8; font-size: 14px;">Explorez la sagesse divine</p>
</header>

<div class="container" id="surahList">
    </div>

<script>
    // Copy quranList kamu yang sudah ada di sini
    const quranList = [ /* ... data surah ... */ ];

    function loadSurah() {
        const container = document.getElementById('surahList');
        quranList.forEach(surah => {
            const card = document.createElement('a');
            card.href = `reader.html?id=${surah.id}`;
            card.className = 'surah-card';
            card.innerHTML = `
                <div class="surah-info">
                    <div class="surah-number">${surah.id}</div>
                    <div>
                        <div class="surah-name">${surah.name}</div>
                        <div class="surah-meta">${surah.type} • ${surah.verses} Versets</div>
                    </div>
                </div>
                <div class="ar-name">${surah.arabic}</div>
            `;
            container.appendChild(card);
        });
    }
    loadSurah();
</script>
</body>
</html>
