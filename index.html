<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Le Saint Coran</title>
    <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Plus+Jakarta+Sans:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --emerald: #064e3b; --gold: #d97706; --bg: #f8fafc; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; margin: 0; background: var(--bg); color: #1e293b; padding-bottom: 50px; }
        header { background: var(--emerald); color: white; padding: 50px 20px; text-align: center; border-bottom: 4px solid var(--gold); }
        .container { max-width: 600px; margin: -30px auto 0; padding: 0 15px; }
        .surah-card { background: white; padding: 20px; margin-bottom: 12px; border-radius: 16px; display: flex; justify-content: space-between; align-items: center; text-decoration: none; color: inherit; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); transition: all 0.2s ease; border: 1px solid #e2e8f0; }
        .surah-card:active { transform: scale(0.97); background: #f8fafc; }
        .surah-info { display: flex; align-items: center; gap: 15px; }
        .surah-number { background: var(--emerald); color: white; width: 35px; height: 35px; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 13px; }
        .surah-name { font-weight: 700; font-size: 16px; color: var(--emerald); margin-bottom: 2px; }
        .surah-meta { font-size: 11px; color: #64748b; text-transform: uppercase; letter-spacing: 0.5px; }
        .ar-name { font-family: 'Amiri', serif; font-size: 24px; color: var(--gold); }
    </style>
</head>
<body>

<header>
    <h1 style="margin:0; font-size: 26px; font-weight: 800;">Le Saint Coran</h1>
    <p style="margin:8px 0 0; opacity: 0.8; font-size: 13px; letter-spacing: 1px;">TRADUCTION FRANÇAISE</p>
</header>

<div class="container" id="surahList">
    </div>

<script>
    // Data Quran (Disederhanakan untuk memastikan fungsi jalan)
    const quranList = [
        { id: 1, name: "Al-Fatihah", arabic: "الفاتحة", verses: 7, type: "mecquoise" },
        { id: 2, name: "Al-Baqarah", arabic: "البقرة", verses: 286, type: "médinoise" },
        { id: 3, name: "Ali 'Imran", arabic: "آل عمران", verses: 200, type: "médinoise" },
        { id: 4, name: "An-Nisa", arabic: "النساء", verses: 176, type: "médinoise" },
        { id: 5, name: "Al-Ma'idah", arabic: "المائدة", verses: 120, type: "médinoise" },
        { id: 6, name: "Al-An'am", arabic: "الأنعام", verses: 165, type: "mecquoise" },
        { id: 7, name: "Al-A'raf", arabic: "الأعراف", verses: 206, type: "mecquoise" },
        { id: 8, name: "Al-Anfal", arabic: "الأنفال", verses: 75, type: "médinoise" },
        { id: 9, name: "At-Tawbah", arabic: "التوبة", verses: 129, type: "médinoise" },
        { id: 10, name: "Yunus", arabic: "يونس", verses: 109, type: "mecquoise" }
        // ... Tambahkan data surat lainnya di sini seperti sebelumnya ...
    ];

    function renderSurah() {
        const container = document.getElementById('surahList');
        if (!container) return;
        
        let html = '';
        quranList.forEach(surah => {
            html += `
                <a href="reader.html?id=${surah.id}" class="surah-card">
                    <div class="surah-info">
                        <div class="surah-number">${surah.id}</div>
                        <div>
                            <div class="surah-name">${surah.name}</div>
                            <div class="surah-meta">${surah.type} • ${surah.verses} Versets</div>
                        </div>
                    </div>
                    <div class="ar-name">${surah.arabic}</div>
                </a>
            `;
        });
        container.innerHTML = html;
    }

    // Memastikan fungsi berjalan setelah HTML selesai dimuat
    if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', renderSurah);
    } else {
        renderSurah();
    }
</script>
</body>
</html>
