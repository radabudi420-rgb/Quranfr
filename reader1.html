<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Le Saint Coran - Lecture</title>
    <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Plus+Jakarta+Sans:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root { --emerald: #064e3b; --gold: #d97706; --bg: #fdfbf7; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; margin: 0; background: var(--bg); padding-bottom: 80px; color: #1e293b; }
        
        header { background: var(--emerald); color: white; padding: 15px; display: flex; align-items: center; position: sticky; top: 0; z-index: 100; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .back-btn { color: white; text-decoration: none; font-size: 24px; padding: 0 10px; font-weight: bold; }
        
        .container { max-width: 600px; margin: auto; padding: 20px; }
        .surah-header { text-align: center; margin-bottom: 30px; border-bottom: 2px solid #e5e7eb; padding-bottom: 20px; }
        .surah-title { font-size: 28px; color: var(--emerald); font-weight: 700; margin: 0; }
        
        .bismillah { font-family: 'Amiri', serif; font-size: 30px; color: var(--gold); margin: 20px 0; display: none; text-align: center; }

        .verse-card { background: white; border-radius: 16px; padding: 25px; margin-bottom: 15px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); border-left: 4px solid var(--gold); position: relative; }
        .verse-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .verse-num { background: #f1f5f9; color: var(--emerald); padding: 4px 12px; border-radius: 8px; font-weight: bold; font-size: 12px; }
        
        /* Tombol Audio Prancis */
        .audio-btn { background: var(--emerald); color: white; border: none; padding: 8px 15px; border-radius: 8px; cursor: pointer; font-size: 12px; font-weight: 600; display: flex; align-items: center; gap: 5px; transition: 0.3s; }
        .audio-btn:hover { background: #043a2c; }
        .audio-btn.playing { background: var(--gold); }

        .ar-text { font-family: 'Amiri', serif; font-size: 32px; text-align: right; line-height: 2.2; color: #111; direction: rtl; margin-bottom: 15px; }
        .fr-text { font-size: 15px; color: #475569; line-height: 1.6; border-top: 1px solid #f1f5f9; padding-top: 15px; font-style: italic; }
        
        .loading { text-align: center; padding: 50px; color: var(--emerald); font-weight: bold; }
        .error-msg { background: #fee2e2; color: #b91c1c; padding: 15px; border-radius: 10px; text-align: center; margin-top: 20px; }
    </style>
</head>
<body>

<header>
    <a href="index.html" class="back-btn">←</a>
    <div style="flex-grow: 1; text-align: center; font-weight: 600;" id="headerTitle">Chargement...</div>
</header>

<div class="container">
    <div id="loader" class="loading">Chargement des versets...</div>
    <div id="content" style="display:none;">
        <div class="surah-header">
            <h1 class="surah-title" id="surahTitle"></h1>
            <div class="bismillah" id="surahBismillah">بِسْمِ اللَّهِ الرَّحْمَنِ الرَّحِيمِ</div>
        </div>
        <div id="versesContainer"></div>
    </div>
</div>

<audio id="mainAudioPlayer"></audio>

<script>
    const params = new URLSearchParams(window.location.search);
    const surahId = parseInt(params.get('id')) || 1;
    const audioPlayer = document.getElementById('mainAudioPlayer');

    async function loadSurah() {
        try {
            const [resAr, resFr] = await Promise.all([
                fetch('quran.json'),
                fetch('fr.shahih.json')
            ]);
            const dataAr = await resAr.json();
            const dataFrRaw = await resFr.json();

            const surahAr = dataAr.find(s => s.id === surahId);
            const surahFr = dataFrRaw.data.surahs.find(s => s.number === surahId);

            if (surahAr && surahFr) {
                renderPage(surahAr, surahFr);
            }
        } catch (error) {
            document.getElementById('loader').innerHTML = `<div class="error-msg">Erreur de chargement des fichiers.</div>`;
        }
    }

    function playAudio(verseNum, btn) {
        // Format ID: Surat 3 digit + Ayat 3 digit (Contoh: 001001)
        const s = String(surahId).padStart(3, '0');
        const v = String(verseNum).padStart(3, '0');
        const audioUrl = `https://cdn.islamic.network/quran/audio/128/ar.alafasy/${(surahId-1)*0 + (parseInt(s+v))}.mp3`;
        
        // Versi alternatif EveryAyah jika di atas bermasalah:
        const altUrl = `https://www.everyayah.com/data/Alafasy_128kbps/${s}${v}.mp3`;

        if (audioPlayer.src === altUrl && !audioPlayer.paused) {
            audioPlayer.pause();
            btn.innerHTML = '▶ Écouter';
            btn.classList.remove('playing');
        } else {
            // Reset semua tombol
            document.querySelectorAll('.audio-btn').forEach(b => {
                b.innerHTML = '▶ Écouter';
                b.classList.remove('playing');
            });
            
            audioPlayer.src = altUrl;
            audioPlayer.play();
            btn.innerHTML = '⏸ Pause';
            btn.classList.add('playing');
            
            audioPlayer.onended = () => {
                btn.innerHTML = '▶ Écouter';
                btn.classList.remove('playing');
            };
        }
    }

    function renderPage(surahAr, surahFr) {
        document.getElementById('loader').style.display = 'none';
        document.getElementById('content').style.display = 'block';
        document.getElementById('headerTitle').innerText = surahFr.englishName;
        document.getElementById('surahTitle').innerText = surahFr.name;

        if (surahId !== 1 && surahId !== 9) {
            document.getElementById('surahBismillah').style.display = 'block';
        }

        const container = document.getElementById('versesContainer');
        let html = '';

        surahAr.verses.forEach((verse, index) => {
            const frenchText = surahFr.ayahs[index] ? surahFr.ayahs[index].text : '';
            html += `
                <div class="verse-card">
                    <div class="verse-top">
                        <span class="verse-num">VERSET ${verse.id}</span>
                        <button class="audio-btn" onclick="playAudio(${verse.id}, this)">
                            ▶ Écouter
                        </button>
                    </div>
                    <div class="ar-text">${verse.text}</div>
                    <div class="fr-text">${frenchText}</div>
                </div>
            `;
        });
        container.innerHTML = html;
    }

    loadSurah();
</script>
</body>
</html>
