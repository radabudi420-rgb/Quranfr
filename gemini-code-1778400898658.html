<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exégèse (Tafsir) du Coran</title>
    <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Plus+Jakarta+Sans:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root { --emerald: #064e3b; --gold: #d97706; --bg: #fdfbf7; --text-light: #64748b; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; margin: 0; background: var(--bg); color: #1e293b; line-height: 1.6; }
        
        header { background: var(--emerald); color: white; padding: 15px; display: flex; align-items: center; position: sticky; top: 0; z-index: 100; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .back-btn { color: white; text-decoration: none; font-size: 24px; padding: 0 10px; font-weight: bold; }
        
        .container { max-width: 700px; margin: auto; padding: 20px; }
        .surah-header { text-align: center; margin-bottom: 40px; }
        .surah-title { font-size: 32px; color: var(--emerald); font-weight: 700; margin: 0; }
        
        .verse-section { background: white; border-radius: 20px; padding: 30px; margin-bottom: 25px; box-shadow: 0 4px 15px rgba(0,0,0,0.03); border: 1px solid #eef2f6; }
        
        .verse-num { color: var(--gold); font-weight: 800; font-size: 14px; display: block; margin-bottom: 15px; letter-spacing: 1px; }

        .ar-text { font-family: 'Amiri', serif; font-size: 34px; text-align: right; line-height: 2.3; color: #111; direction: rtl; margin-bottom: 20px; }
        
        /* Gaya Terjemahan */
        .fr-translation { font-size: 16px; color: #334155; font-weight: 600; margin-bottom: 20px; padding-left: 15px; border-left: 3px solid #e2e8f0; }
        
        /* Gaya Tafsir (Exégèse) */
        .tafsir-box { background: #f8fafc; padding: 20px; border-radius: 12px; border-top: 2px solid var(--emerald); }
        .tafsir-label { display: block; font-size: 11px; font-weight: 800; color: var(--emerald); margin-bottom: 10px; text-transform: uppercase; letter-spacing: 0.5px; }
        .tafsir-text { font-size: 15px; color: #475569; text-align: justify; }

        .loading { text-align: center; padding: 100px; color: var(--emerald); font-weight: bold; font-size: 18px; }
    </style>
</head>
<body>

<header>
    <a href="index.html" class="back-btn">←</a>
    <div style="flex-grow: 1; text-align: center; font-weight: 600;">EXÉGÈSE (TAFSIR)</div>
</header>

<div class="container">
    <div id="loader" class="loading">Préparation de l'exégèse...</div>
    <div id="content" style="display:none;">
        <div class="surah-header">
            <h1 class="surah-title" id="surahTitle"></h1>
            <p style="color: var(--gold); font-weight: 600; margin-top: 5px;" id="surahSubTitle"></p>
        </div>
        <div id="versesContainer"></div>
    </div>
</div>

<script>
    const params = new URLSearchParams(window.location.search);
    const surahId = parseInt(params.get('id')) || 1;

    async function loadTafsirMode() {
        try {
            // Memanggil 3 file JSON lokal
            const [resAr, resFr, resTafsir] = await Promise.all([
                fetch('quran.json'),
                fetch('fr.shahih.json'),
                fetch('fr.muntakhab.json')
            ]);

            const dataAr = await resAr.json();
            const dataFrRaw = await resFr.json();
            const dataTafsirRaw = await resTafsir.json();

            const surahAr = dataAr.find(s => s.id === surahId);
            const surahFr = dataFrRaw.data.surahs.find(s => s.number === surahId);
            
            // Struktur Muntakhab biasanya mirip dengan Shahih (data.surahs atau langsung array)
            // Sesuaikan jika strukturnya berbeda
            const surahTafsir = dataTafsirRaw.data ? 
                                dataTafsirRaw.data.surahs.find(s => s.number === surahId) : 
                                dataTafsirRaw.find(s => s.id === surahId);

            if (surahAr && surahFr) {
                renderTafsir(surahAr, surahFr, surahTafsir);
            }
        } catch (error) {
            console.error(error);
            document.getElementById('loader').innerHTML = "Erreur: Impossible de charger le Tafsir.";
        }
    }

    function renderTafsir(surahAr, surahFr, surahTafsir) {
        document.getElementById('loader').style.display = 'none';
        document.getElementById('content').style.display = 'block';
        document.getElementById('surahTitle').innerText = surahFr.name;
        document.getElementById('surahSubTitle').innerText = surahFr.englishName;

        const container = document.getElementById('versesContainer');
        let html = '';

        surahAr.verses.forEach((verse, index) => {
            const translation = surahFr.ayahs[index] ? surahFr.ayahs[index].text : '';
            
            // Mengambil teks tafsir dari Muntakhab
            let tafsirText = "";
            if (surahTafsir) {
                // Jika strukturnya .ayahs (seperti AlQuran.cloud) atau .verses
                const ayahsTafsir = surahTafsir.ayahs || surahTafsir.verses;
                tafsirText = ayahsTafsir[index] ? ayahsTafsir[index].text : 'Tafsir non disponible pour ce verset.';
            }

            html += `
                <div class="verse-section">
                    <span class="verse-num">VERSET ${verse.id}</span>
                    <div class="ar-text">${verse.text}</div>
                    <div class="fr-translation">${translation}</div>
                    <div class="tafsir-box">
                        <span class="tafsir-label">Exégèse (Al-Muntakhab)</span>
                        <div class="tafsir-text">${tafsirText}</div>
                    </div>
                </div>
            `;
        });
        container.innerHTML = html;
    }

    loadTafsirMode();
</script>
</body>
</html>
