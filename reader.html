<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Le Saint Coran</title>
    <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Plus+Jakarta+Sans:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --emerald: #064e3b; --gold: #d97706; --bg: #f8fafc; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; margin: 0; background: var(--bg); color: #1e293b; padding-bottom: 50px; }
        header { background: var(--emerald); color: white; padding: 50px 20px; text-align: center; border-bottom: 4px solid var(--gold); }
        .container { max-width: 600px; margin: -30px auto 0; padding: 0 15px; }
        .surah-card { background: white; padding: 20px; margin-bottom: 12px; border-radius: 16px; display: flex; justify-content: space-between; align-items: center; text-decoration: none; color: inherit; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); border: 1px solid #e2e8f0; }
        .surah-info { display: flex; align-items: center; gap: 15px; }
        .surah-number { background: var(--emerald); color: white; width: 35px; height: 35px; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 13px; }
        .surah-name { font-weight: 700; font-size: 16px; color: var(--emerald); }
        .ar-name { font-family: 'Amiri', serif; font-size: 24px; color: var(--gold); }
    </style>
</head>
<body>

<header>
    <h1 style="margin:0; font-size: 26px;">Le Saint Coran</h1>
    <p style="margin:8px 0 0; opacity: 0.8; font-size: 13px;">TRADUCTION FRANÇAISE</p>
</header>

<div class="container" id="surahList"></div>

<script>
    // Contoh data singkat, silakan lengkapi sampai 114
    const quranList = [
        { id: 1, name: "Al-Fatihah", arabic: "الفاتحة", verses: 7, type: "mecquoise" },
        { id: 2, name: "Al-Baqarah", arabic: "البقرة", verses: 286, type: "médinoise" },
        { id: 36, name: "Ya-Sin", arabic: "يس", verses: 83, type: "mecquoise" }
    ];

    function render() {
        const container = document.getElementById('surahList');
        container.innerHTML = quranList.map(surah => `
            <a href="reader.html?id=${surah.id}" class="surah-card">
                <div class="surah-info">
                    <div class="surah-number">${surah.id}</div>
                    <div>
                        <div class="surah-name">${surah.name}</div>
                        <small style="color:#64748b">${surah.type} • ${surah.verses} Versets</small>
                    </div>
                </div>
                <div class="ar-name">${surah.arabic}</div>
            </a>
        `).join('');
    }
    window.onload = render;
</script>
</body>
</html>
