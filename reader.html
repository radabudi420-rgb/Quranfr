<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lecture</title>
    <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Plus+Jakarta+Sans:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root { --emerald: #064e3b; --gold: #d97706; --bg: #fdfbf7; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; margin: 0; background: var(--bg); }
        header { background: var(--emerald); color: white; padding: 15px; display: flex; align-items: center; position: sticky; top: 0; z-index: 100; }
        .back-btn { color: white; text-decoration: none; font-size: 24px; margin-right: 15px; }
        .container { max-width: 600px; margin: auto; padding: 20px; }
        .verse-card { background: white; border-radius: 16px; padding: 20px; margin-bottom: 15px; border-left: 4px solid var(--gold); box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .ar { font-family: 'Amiri', serif; font-size: 32px; text-align: right; direction: rtl; line-height: 2; }
        .fr { color: #475569; font-style: italic; margin-top: 10px; padding-top: 10px; border-top: 1px solid #f1f5f9; line-height: 1.6; }
        .bismillah { font-family: 'Amiri', serif; font-size: 30px; text-align: center; color: var(--gold); padding: 25px 0; display: none; }
        .loader { text-align: center; margin-top: 50px; color: var(--emerald); font-weight: 600; }
        .error { background: #fee2e2; color: #b91c1c; padding: 15px; border-radius: 10px; text-align: center; }
    </style>
</head>
<body>

<header>
    <a href="index.html" class="back-btn">‹</a>
    <div id="headerTitle" style="font-weight: 600;">Chargement...</div>
</header>

<div class="container">
    <div id="bismillah" class="bismillah">بِسْمِ اللَّهِ الرَّحْمَنِ الرَّحِيمِ</div>
    <div id="loader" class="loader">Patientez...</div>
    <div id="verses"></div>
</div>

<script>
    const params = new URLSearchParams(window.location.search);
    const surahId = params.get('id') || 1;

    async function init() {
        const loader = document.getElementById('loader');
        try {
            const [resAr, resFr] = await Promise.all([
                fetch('quran.json'),
                fetch('fr.shahih.json')
            ]);

            if (!resAr.ok || !resFr.ok) throw new Error("Fichiers JSON introuvables");

            const dataAr = await resAr.json();
            const dataFr = await resFr.json();

            // Auto-detect array ayat (mendukung berbagai format API)
            const getVerses = (obj) => {
                if (Array.isArray(obj)) return obj;
                if (obj.quran) return obj.quran;
                return Object.values(obj).find(v => Array.isArray(v)) || [];
            };

            const versesAr = getVerses(dataAr).filter(v => (v.chapter || v.sura) == surahId);
            const versesFr = getVerses(dataFr).filter(v => (v.chapter || v.sura) == surahId);

            render(versesAr, versesFr);
        } catch (err) {
            loader.innerHTML = `<div class="error"><b>Erreur:</b> ${err.message}<br><small>Vérifiez que les fichiers quran.json et fr.shahih.json sont bien présents.</small></div>`;
        }
    }

    function render(ar, fr) {
        document.getElementById('loader').style.display = 'none';
        document.getElementById('headerTitle').innerText = "Sourate " + surahId;

        if (surahId != 1 && surahId != 9) {
            document.getElementById('bismillah').style.display = 'block';
        }

        const container = document.getElementById('verses');
        container.innerHTML = ar.map((v, i) => `
            <div class="verse-card">
                <div style="font-size:11px; color:var(--emerald); font-weight:700; margin-bottom:8px;">VERSET ${v.verse}</div>
                <div class="ar">${v.text}</div>
                <div class="fr">${fr[i] ? fr[i].text : ''}</div>
            </div>
        `).join('');
    }

    init();
</script>
</body>
</html>
