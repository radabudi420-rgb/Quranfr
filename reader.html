<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Le Saint Coran - Lecture</title>
    <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Plus+Jakarta+Sans:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root { --emerald: #064e3b; --gold: #d97706; --bg: #fdfbf7; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; margin: 0; background: var(--bg); padding-bottom: 50px; color: #1e293b; }
        header { background: var(--emerald); color: white; padding: 15px; display: flex; align-items: center; position: sticky; top: 0; z-index: 100; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .back-btn { color: white; text-decoration: none; font-size: 24px; padding: 0 10px; font-weight: bold; }
        .container { max-width: 600px; margin: auto; padding: 20px; }
        .surah-header { text-align: center; margin-bottom: 30px; border-bottom: 2px solid #e5e7eb; padding-bottom: 20px; }
        .surah-title { font-size: 28px; color: var(--emerald); font-weight: 700; margin: 0; }
        .bismillah { font-family: 'Amiri', serif; font-size: 30px; color: var(--gold); margin: 20px 0; display: none; text-align: center; }
        .verse-card { background: white; border-radius: 16px; padding: 25px; margin-bottom: 15px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); border-left: 4px solid var(--gold); }
        .verse-num { background: #f1f5f9; color: var(--emerald); padding: 4px 10px; border-radius: 8px; font-weight: bold; font-size: 11px; display: inline-block; margin-bottom: 15px; }
        .ar-text { font-family: 'Amiri', serif; font-size: 32px; text-align: right; line-height: 2.2; color: #111; direction: rtl; margin-bottom: 15px; word-wrap: break-word; }
        .fr-text { font-size: 15px; color: #475569; line-height: 1.6; border-top: 1px solid #f1f5f9; padding-top: 15px; font-style: italic; }
        .loading { text-align: center; padding: 50px; color: var(--emerald); font-weight: bold; }
        .error-msg { background: #fee2e2; color: #b91c1c; padding: 15px; border-radius: 10px; text-align: center; margin-top: 20px; }
    </style>
</head>
<body>

<header>
    <a href="index.html" class="back-btn">←</a>
    <div style="flex-grow: 1; text-align: center; font-weight: 600;" id="headerTitle">Lecture...</div>
</header>

<div class="container">
    <div id="loader" class="loading">Chargement des versets...</div>
    <div id="content" style="display:none;">
        <div class="surah-header">
            <h1 class="surah-title" id="surahTitle">Loading...</h1>
            <div class="bismillah" id="surahBismillah">بِسْمِ اللَّهِ الرَّحْمَنِ الرَّحِيمِ</div>
        </div>
        <div id="versesContainer"></div>
    </div>
</div>

<script>
    const params = new URLSearchParams(window.location.search);
    const surahId = parseInt(params.get('id')) || 1;

    async function loadSurah() {
        try {
            const [resAr, resFr] = await Promise.all([
                fetch('quran.json'),
                fetch('fr.shahih.json')
            ]);

            const dataAr = await resAr.json();
            const dataFrRaw = await resFr.json();

            // Sesuai isi file: dataAr adalah Array
            const surahAr = dataAr.find(s => s.id === surahId);
            
            // Sesuai isi file: dataFrRaw memiliki struktur .data.surahs
            const surahFr = dataFrRaw.data.surahs.find(s => s.number === surahId);

            if (surahAr && surahFr) {
                renderPage(surahAr, surahFr);
            } else {
                throw new Error("Surah tidak ditemukan");
            }
        } catch (error) {
            console.error(error);
            document.getElementById('loader').innerHTML = `<div class="error-msg">Gagal memuat data. Periksa konsol browser untuk detail.</div>`;
        }
    }

    function renderPage(surahAr, surahFr) {
        document.getElementById('loader').style.display = 'none';
        document.getElementById('content').style.display = 'block';

        document.getElementById('headerTitle').innerText = surahFr.englishName;
        document.getElementById('surahTitle').innerText = surahFr.name;

        // Tampilkan Bismillah jika bukan Al-Fatihah atau At-Taubah
        if (surahId !== 1 && surahId !== 9) {
            document.getElementById('surahBismillah').style.display = 'block';
        }

        const container = document.getElementById('versesContainer');
        let html = '';

        // Menggabungkan teks Arab (verses) dan Perancis (ayahs)
        surahAr.verses.forEach((verse, index) => {
            const frenchText = surahFr.ayahs[index] ? surahFr.ayahs[index].text : 'Traduction non disponible';
            html += `
                <div class="verse-card">
                    <span class="verse-num">VERSET ${verse.id}</span>
                    <div class="ar-text">${verse.text}</div>
                    <div class="fr-text">${frenchText}</div>
                </div>
            `;
        });
        container.innerHTML = html;
    }

    loadSurah();
</script>
</body>
</html>
